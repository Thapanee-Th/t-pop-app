name: flutter_subscription_app
description: Subscription flow app with clean architecture and Riverpod

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Firebase
  firebase_core: ^3.4.0
  firebase_analytics: ^11.3.0

  # Local Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true  # Enables l10n generation

  # Asset and font declarations are commented out because the referenced
  # directories/files do not exist yet. Uncomment and add the actual
  # files under `assets/` when ready.
  assets:
    - assets/images/
  #   - assets/animations/
  #
  # fonts:
  #   - family: Sarabun
  #     fonts:
  #       - asset: assets/fonts/Sarabun-Regular.ttf
  #       - asset: assets/fonts/Sarabun-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Sarabun-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Sarabun-Bold.ttf
  #         weight: 700
